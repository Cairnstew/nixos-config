name: VM Tests (requires KVM)

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'VM test to run (empty = all)'
        required: false
        type: choice
        options:
          - ''
          - vm-test-disko-dualboot
          - vm-test-dscnix-yaml

jobs:
  vm-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: cairnstew-nixos-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Verify KVM
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "ERROR: /dev/kvm not found!"
            echo "VM tests require KVM acceleration."
            echo "This workflow must run on a self-hosted runner with KVM enabled."
            exit 1
          fi
          echo "KVM available: $(ls -l /dev/kvm)"

      - name: Build VM test
        run: |
          TEST="${{ inputs.test }}"
          if [ -z "$TEST" ]; then
            echo "Building all VM tests..."
            nix build .#checks.x86_64-linux.vm-test-disko-dualboot \
                      .#checks.x86_64-linux.vm-test-dscnix-yaml \
                      --print-build-logs
          else
            echo "Building $TEST..."
            nix build ".#checks.x86_64-linux.$TEST" --print-build-logs
          fi

      - name: Push to Cachix
        run: |
          cachix push cairnstew-nixos-config-cache ./result

      - name: Results
        run: |
          echo "=== VM Tests Complete ==="
          echo "All VM tests passed."
