name: Check Flake Health

on:
  schedule:
    # Run daily at 7 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Check that all configurations evaluate without errors
  # ─────────────────────────────────────────────────────────────────────────────
  eval-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: laptop
            type: nixos
          - name: server
            type: nixos
          - name: wsl
            type: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Evaluate ${{ matrix.name }}
        run: |
          echo "Evaluating ${{ matrix.type }} configuration: ${{ matrix.name }}"
          
          if [ "${{ matrix.type }}" = "nixos" ]; then
            nix eval .#nixosConfigurations.${{ matrix.name }}.config.system.build.toplevel --json > /dev/null
          elif [ "${{ matrix.type }}" = "darwin" ]; then
            nix eval .#darwinConfigurations.${{ matrix.name }}.config.system.build.toplevel --json > /dev/null
          elif [ "${{ matrix.type }}" = "home" ]; then
            nix eval .#homeConfigurations.${{ matrix.name }}.activationPackage --json > /dev/null
          fi
          
          echo "✓ Evaluation successful"

  # ─────────────────────────────────────────────────────────────────────────────
  # Check for outdated inputs
  # ─────────────────────────────────────────────────────────────────────────────
  check-outdated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Check for outdated inputs
        id: outdated
        run: |
          echo "Checking for outdated flake inputs..."
          
          # Try to use nix flake update --dry-run if available
          if nix flake update --dry-run 2>&1 | tee outdated.log; then
            if grep -q "would update" outdated.log 2>/dev/null; then
              echo "outdated=true" >> $GITHUB_OUTPUT
              echo "Updates available!"
            else
              echo "outdated=false" >> $GITHUB_OUTPUT
              echo "All inputs are up to date."
            fi
          else
            echo "Could not check for outdated inputs"
            echo "outdated=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if outdated
        if: steps.outdated.outputs.outdated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Flake inputs are outdated';
            const body = `Some flake inputs have updates available.

            Run \`nix flake update --dry-run\` locally to see what's available,
            or trigger the [Update Flake Inputs workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-flake.yml).

            _This issue was automatically created by the Check Flake Health workflow._`;

            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              labels: 'automated,dependencies'
            });

            const existing = issues.data.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['automated', 'dependencies']
              });
            }
