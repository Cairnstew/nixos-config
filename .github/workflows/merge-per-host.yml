name: Merge Per-Host Branch

on:
  push:
    branches: [desktop, laptop, server, wsl, minimal]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Validate config
        run: |
          nix build ".#nixosConfigurations.${{ github.ref_name }}.config.system.build.toplevel" --dry-run 2>&1 | tail -1

      - name: Create or update PR to master
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<-EOF
          ## Automated PR from \`$BRANCH\`

          Changes pushed to the \`$BRANCH\` branch are proposed for merge into \`master\`.

          ### Verification
          - [x] Config validates successfully
          - [ ] CI passes

          ---
          *This PR was automatically generated by the Merge Per-Host Branch workflow.*
          EOF

          PR_OPEN=$(gh pr view "$BRANCH" --repo "${{ github.repository }}" --state OPEN --json url --jq .url 2>/dev/null || true)
          if [ -z "$PR_OPEN" ]; then
            # Close any stale merged/closed PR to allow creating a new one
            STALE=$(gh pr view "$BRANCH" --repo "${{ github.repository }}" --json number --jq .number 2>/dev/null || true)
            if [ -n "$STALE" ]; then
              gh pr close "$STALE" --repo "${{ github.repository }}" --comment "superseded by new push" 2>/dev/null || true
            fi
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "auto-merge: $BRANCH → master" \
              --body-file "$BODY_FILE"
            echo "PR created"
          else
            gh pr edit "$BRANCH" --repo "${{ github.repository }}" \
              --title "auto-merge: $BRANCH → master" \
              --body-file "$BODY_FILE"
            echo "PR updated: $PR_OPEN"
          fi
          rm -f "$BODY_FILE"
          echo "pr-number=$(gh pr view "$BRANCH" --repo "${{ github.repository }}" --json number --jq .number)" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr-number
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --merge "${{ steps.create-pr.outputs.pr-number }}" \
            --repo "${{ github.repository }}"
