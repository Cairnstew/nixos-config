name: Merge Per-Host Branch

on:
  push:
    branches: [desktop, laptop, server, wsl, minimal]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Evaluate config
        run: |
          nix eval ".#nixosConfigurations.${{ github.ref_name }}" --json > /dev/null

      - name: Create or update PR to master
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          base: master
          branch: ${{ github.ref_name }}
          title: "auto-merge: ${{ github.ref_name }} \u2192 master"
          body: |
            ## Automated PR from `${{ github.ref_name }}`

            Changes pushed to the `${{ github.ref_name }}` branch are proposed for merge into `master`.

            ### Verification
            - [x] Config evaluates successfully
            - [ ] CI passes

            ---
            *This PR was automatically generated by the Merge Per-Host Branch workflow.*
          commit-message: "auto-merge: ${{ github.ref_name }} \u2192 master"
          delete-branch: false

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}"
