name: Full CI (Cron)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and cache all NixOS configurations
  # ─────────────────────────────────────────────────────────────────────────────
  build-nixos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [laptop, server, wsl]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: cairnstew-nixos-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          echo "Building .#${{ matrix.host }}..."
          nix build .#${{ matrix.host }} --out-link result-${{ matrix.host }}
          echo "Build successful!"
          ls -la result-${{ matrix.host }}

      - name: Push to Cachix
        run: |
          echo "Pushing build results to Cachix..."
          cachix push cairnstew-nixos-config-cache ./result-${{ matrix.host }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Flake check (evaluation only, no builds)
  # Skipped by default — known to fail on secrets path resolution in CI
  # (error: path '...-secrets' is not valid). The build-nixos jobs above already
  # validate all configurations by building them.
  # ─────────────────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────────────────
  # Build dev shells for all supported systems
  # ─────────────────────────────────────────────────────────────────────────────
  build-devshells:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        system: [x86_64-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: cairnstew-nixos-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build devShell for ${{ matrix.system }}
        run: |
          echo "Building devShell.${{ matrix.system }}.default..."
          nix build .#devShells.${{ matrix.system }}.default --out-link result-devshell
          echo "Dev shell build successful!"

      - name: Push to Cachix
        run: |
          cachix push cairnstew-nixos-config-cache ./result-devshell
