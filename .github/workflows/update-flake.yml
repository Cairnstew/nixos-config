name: Update Flake Inputs

on:
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      inputs_to_update:
        description: 'Space-separated list of inputs to update (leave empty for all primary)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        env:
          INPUTS_TO_UPDATE: ${{ github.event.inputs.inputs_to_update }}
        run: |
          if [ -n "$INPUTS_TO_UPDATE" ]; then
            echo "Updating specific inputs: $INPUTS_TO_UPDATE"
            for input in $INPUTS_TO_UPDATE; do
              nix flake lock --update-input "$input"
            done
          else
            echo "Updating primary inputs via .#update..."
            # The update script is defined in the flake
            nix run .#update
          fi

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet flake.lock; then
            echo "No changes to flake.lock"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in flake.lock"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          branch: update-flake-inputs
          title: 'chore: update flake inputs'
          body: |
            ## Automated Flake Update

            This PR updates the flake inputs to their latest versions.

            ### Updated Inputs
            ${{ github.event.inputs.inputs_to_update || 'All primary inputs' }}

            ### Changes
            ```
            $(git diff flake.lock | head -100)
            ```

            ### Verification
            - [ ] CI passes
            - [ ] Test builds succeed
            - [ ] No breaking changes in release notes

            ---
            *This PR was automatically generated by the Update Flake Inputs workflow.*
          commit-message: 'chore: update flake inputs'
          delete-branch: true
