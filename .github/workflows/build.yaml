name: Build NixOS Image

on:
  workflow_dispatch:
    inputs:
      host:
        description: "NixOS host to build"
        required: true
        type: choice
        options:
          - wsl
          - pc
          - server
      build_type:
        description: "Optional: choose a specific build target; defaults to first available"
        required: false
        type: string
      release_tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Determine build target
        id: build-target
        run: |
          HOST="${{ github.event.inputs.host }}"
          # List all available system.build keys for this host
          BUILD_KEYS=$(nix eval --raw .#nixosConfigurations."$HOST".config.system.build | jq -r 'keys[]')

          # Use user-specified build_type if valid, else first key
          if [ -n "${{ github.event.inputs.build_type }}" ]; then
            if echo "$BUILD_KEYS" | grep -qx "${{ github.event.inputs.build_type }}"; then
              TARGET="${{ github.event.inputs.build_type }}"
            else
              echo "Invalid build_type '${{ github.event.inputs.build_type }}'. Available: $BUILD_KEYS"
              exit 1
            fi
          else
            TARGET=$(echo "$BUILD_KEYS" | head -n 1)
          fi

          echo "Detected build target: $TARGET"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Build NixOS image
        run: |
          HOST="${{ github.event.inputs.host }}"
          TARGET="${{ steps.build-target.outputs.target }}"

          nix build .#nixosConfigurations."$HOST".config.system.build."$TARGET" \
            --out-link ./result \
            --show-trace

      - name: Locate image file
        id: image
        run: |
          TARGET="${{ steps.build-target.outputs.target }}"
          if [ "$TARGET" = "isoImage" ]; then
            FILE=$(find ./result/iso -name "*.iso" | head -1)
          elif [ "$TARGET" = "tarballBuilder" ]; then
            FILE=$(find ./result -name "*.tar.gz" | head -1)
          else
            FILE=$(find ./result -name "*.img" -o -name "*.qcow2" | head -1)
          fi

          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"
          sha256sum "$FILE" > "$FILE.sha256"
          echo "Found image: $FILE"
          ls -lh "$FILE"

      - name: Split ISO into segments
        if: steps.build-target.outputs.target == 'isoImage'
        run: |
          mkdir -p ./image-segments
          ISONAME="${{ steps.image.outputs.name }}"

          split \
            --bytes=1900m \
            --suffix-length=3 \
            --numeric-suffixes=1 \
            "${{ steps.image.outputs.path }}" \
            "./image-segments/${ISONAME}.part"

          cp "${{ steps.image.outputs.path }}.sha256" ./image-segments/
          cp ./scripts/join-iso.sh ./image-segments/
          echo "Segments produced:"
          ls -lh ./image-segments/

      - name: Create GitHub release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          HOST="${{ github.event.inputs.host }}"
          IMAGE_NAME="${{ steps.image.outputs.name }}"

          gh release create "$TAG" \
            --title "NixOS Image — ${HOST} ${TAG}" \
            --notes "## NixOS Image for \`${HOST}\`  
          Built from commit \`${{ github.sha }}\`."

          if [ "${{ steps.build-target.outputs.target }}" = "isoImage" ]; then
            gh release upload "$TAG" ./image-segments/*
          else
            gh release upload "$TAG" "${{ steps.image.outputs.path }}" "${{ steps.image.outputs.path }}.sha256"
          fi