name: Build NixOS Image

on:
  workflow_dispatch:
    inputs:
      host:
        description: "NixOS host to build (e.g. my-host)"
        required: true
        default: "my-host"
      type:
        description: "Build type"
        required: true
        type: choice
        options:
          - wsl
          - pc
          - vm
        default: wsl
      release_tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Determine build target
        id: build-target
        run: |
          case "${{ github.event.inputs.type }}" in
            wsl)
              BUILD_TARGET="tarballBuilder"
              ;;
            pc)
              BUILD_TARGET="isoImage"
              ;;
            vm)
              BUILD_TARGET="vmWithBootLoader"
              ;;
            *)
              echo "Unknown type '${{ github.event.inputs.type }}'"
              exit 1
              ;;
          esac
          echo "target=$BUILD_TARGET" >> "$GITHUB_OUTPUT"

      - name: Build NixOS image
        run: |
          nix build \
            .#nixosConfigurations.${{ github.event.inputs.host }}.config.system.build.${{ steps.build-target.outputs.target }} \
            --out-link ./result \
            --show-trace

      - name: Locate image file
        id: image
        run: |
          BUILD_TYPE="${{ steps.build-target.outputs.target }}"
          if [ "$BUILD_TYPE" = "isoImage" ]; then
            FILE=$(find ./result/iso -name "*.iso" | head -1)
          elif [ "$BUILD_TYPE" = "tarballBuilder" ]; then
            FILE=$(find ./result -name "*.tar.gz" | head -1)
          else
            FILE=$(find ./result -name "*.img" -o -name "*.qcow2" | head -1)
          fi

          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"
          sha256sum "$FILE" > "$FILE.sha256"
          echo "Found image: $FILE"
          ls -lh "$FILE"

      - name: Split image into segments
        if: steps.build-target.outputs.target == 'isoImage'
        run: |
          mkdir -p ./image-segments
          ISONAME="${{ steps.image.outputs.name }}"

          # Split into 1900 MiB chunks — safely under GitHub's 2 GiB asset limit
          split \
            --bytes=1900m \
            --suffix-length=3 \
            --numeric-suffixes=1 \
            "${{ steps.image.outputs.path }}" \
            "./image-segments/${ISONAME}.part"

          # Copy checksum and join script
          cp "${{ steps.image.outputs.path }}.sha256" ./image-segments/
          cp ./scripts/join-iso.sh ./image-segments/
          echo "Segments produced:"
          ls -lh ./image-segments/

      - name: Create GitHub release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          HOST="${{ github.event.inputs.host }}"
          IMAGE_NAME="${{ steps.image.outputs.name }}"

          gh release create "$TAG" \
            --title "NixOS Image — ${HOST} ${TAG}" \
            --notes "## NixOS Image for \`${HOST}\`  
          Built from commit \`${{ github.sha }}\`."

          if [ "${{ steps.build-target.outputs.target }}" = "isoImage" ]; then
            gh release upload "$TAG" ./image-segments/*
          else
            gh release upload "$TAG" "${{ steps.image.outputs.path }}" "${{ steps.image.outputs.path }}.sha256"
          fi