name: Format Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Check formatting
        run: |
          echo "Checking nix formatting..."
          FILE_COUNT=$(find . -name '*.nix' -not -path './.git/*' -not -path '*/node_modules/*' -not -path './secrets/*' -not -path './templates/*' | wc -l)
          echo "Found $FILE_COUNT .nix files to check"

          # Build the flake's pinned formatter (nixpkgs-fmt)
          nix build .#formatter.x86_64-linux --out-link /tmp/nix-fmt-result 2>/dev/null
          FORMATTER="/tmp/nix-fmt-result"

          if find . -name '*.nix' -not -path './.git/*' -not -path '*/node_modules/*' -not -path './secrets/*' -not -path './templates/*' -print0 | xargs -0 "$FORMATTER/bin/nixpkgs-fmt" --check; then
            echo "All files are properly formatted!"
          else
            echo "::error::Formatting issues found!"
            exit 1
          fi
