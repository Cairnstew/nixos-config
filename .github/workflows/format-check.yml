name: Format Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Check formatting
        run: |
          echo "Checking nix formatting..."
          FILE_COUNT=$(find . -name '*.nix' -not -path './.git/*' -not -path '*/node_modules/*' -not -path './secrets/*' | wc -l)
          echo "Found $FILE_COUNT .nix files to check"

          # Use the flake's pinned formatter (nixpkgs-fmt) via xargs to avoid ARG_MAX
          FORMATTER=$(nix eval .#formatter.x86_64-linux --raw 2>/dev/null)
          if [ -z "$FORMATTER" ] || [ ! -f "$FORMATTER/bin/nixpkgs-fmt" ]; then
            echo "Building formatter..."
            nix build .#formatter.x86_64-linux
            FORMATTER="./result"
          fi

          if find . -name '*.nix' -not -path './.git/*' -not -path '*/node_modules/*' -not -path './secrets/*' -print0 | xargs -0 "$FORMATTER/bin/nixpkgs-fmt" --check; then
            echo "All files are properly formatted!"
          else
            echo "::error::Formatting issues found!"
            exit 1
          fi
