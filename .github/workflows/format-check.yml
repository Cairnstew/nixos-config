name: Format Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Check formatting
        run: |
          # Try to use nix fmt if available
          if nix fmt --help >/dev/null 2>&1; then
            echo "Using nix fmt..."
            # Create a backup of current state
            git stash push -m "format-check-backup" --include-untracked || true
            
            # Run formatter
            nix fmt
            
            # Check if any files were modified
            if ! git diff --quiet; then
              echo "::error::Formatting issues found! Run 'nix fmt' locally to fix."
              echo ""
              echo "Files that need formatting:"
              git diff --name-only
              echo ""
              echo "Diff:"
              git diff
              exit 1
            fi
          else
            echo "No formatter configured in flake.nix"
            echo "Consider adding a formatter package for 'nix fmt' support"
          fi
