name: Package Check

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/**'
  push:
    branches: [main, master]
    paths:
      - 'packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-affected:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ci
          - update
          - test
          - localsend
          - uup-converter
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: cairnstew-nixos-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build and cache ${{ matrix.package }}
        run: |
          echo "Building .#${{ matrix.package }}..."
          nix build .#${{ matrix.package }} --out-link result-${{ matrix.package }}
          echo "Build successful!"
          cachix push cairnstew-nixos-config-cache ./result-${{ matrix.package }}
