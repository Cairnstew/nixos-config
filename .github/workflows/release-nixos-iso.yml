name: Release NixOS ISO/WSL (single release per host)

on:
  workflow_dispatch:
    inputs:
      host:
        description: 'Host name (e.g. server, laptop, desktop)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: cairnstew-nixos-config-cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build and Generate Asset
        run: |
          set -euo pipefail

          echo "==> Building target: ${{ inputs.host }}"
          nix build .#${{ inputs.host }} --out-link result-target

          BUILD_OUT=$(readlink -f result-target)
          echo "Build output: $BUILD_OUT"

          # --- WSL CASE ---
          if [[ -d "$BUILD_OUT/bin" ]]; then
            echo "Detected WSL output"

            BUILDER=$(find "$BUILD_OUT/bin" -type f | head -n1)

            if [[ -z "$BUILDER" ]]; then
              echo "ERROR: No file found in bin/"
              ls -R "$BUILD_OUT"
              exit 1
            fi

            FINAL_FILE="nixos-${{ inputs.host }}.tar.gz"
            EXTENSION="tar.gz"

            echo "Running builder script..."
            sudo "$BUILDER" "$FINAL_FILE"

          # --- ISO CASE ---
          elif [[ -d "$BUILD_OUT/iso" ]]; then
            echo "Detected ISO output"

            ISO_PATH=$(find "$BUILD_OUT/iso" -type f -name '*.iso' | head -n1)

            if [[ -z "$ISO_PATH" ]]; then
              echo "ERROR: No ISO found"
              exit 1
            fi

            FINAL_FILE="nixos-${{ inputs.host }}.iso"
            EXTENSION="iso"

            cp -L "$ISO_PATH" "$FINAL_FILE"

          # --- UNKNOWN ---
          else
            echo "ERROR: Unknown output structure"
            ls -R "$BUILD_OUT"
            exit 1
          fi

          echo "==> Computing SHA-256"
          sha256sum "$FINAL_FILE" > "${FINAL_FILE}.sha256"

          echo "==> Splitting into ~1.9GB parts"
          split -d -b 1900M "$FINAL_FILE" "${FINAL_FILE}.part"

          echo "FINAL_FILE=$FINAL_FILE" >> $GITHUB_ENV
          echo "EXTENSION=$EXTENSION" >> $GITHUB_ENV

      - name: Ensure GitHub CLI is installed
        run: |
          type gh || (sudo apt-get update && sudo apt-get install -y gh)

      - name: Create (or replace) GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="iso-${{ inputs.host }}"
          TITLE="NixOS Build — ${{ inputs.host }} (latest)"

          echo "Deleting old release if it exists..."
          gh release delete "$TAG" --yes 2>/dev/null || true

          echo "Creating release..."
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Latest build for **${{ inputs.host }}**

          Built from:
          \`nix build .#${{ inputs.host }}\`

          **Contents:**
          - Split archive parts
          - SHA256 checksum
          - join script

          **Reassemble:**
          \`\`\`bash
          bash join-iso.sh $FINAL_FILE
          \`\`\`
          "

          echo "Uploading assets..."
          gh release upload "$TAG" \
            ${FINAL_FILE}.part* \
            ${FINAL_FILE}.sha256 \
            scripts/join-iso.sh \
            --clobber