name: Release NixOS ISO/WSL

on:
  workflow_dispatch:
    inputs:
      host:
        description: 'Host name (e.g. server, laptop, wsl)'
        required: true
        type: choice
        options:
          - laptop
          - server
          - wsl
      tag_suffix:
        description: 'Optional tag suffix (e.g. -beta, -rc1)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  RELEASE_TAG: iso-${{ github.event.inputs.host }}${{ github.event.inputs.tag_suffix }}
  RELEASE_NAME: NixOS Build — ${{ github.event.inputs.host }}${{ github.event.inputs.tag_suffix }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: cairnstew-nixos-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build target
        id: build
        run: |
          set -euo pipefail

          echo "=========================================="
          echo "Building target: ${{ inputs.host }}"
          echo "=========================================="
          
          nix build .#${{ inputs.host }} \
            --out-link result-target \
            --print-build-logs

          BUILD_OUT=$(readlink -f result-target)
          echo "Build output: $BUILD_OUT"

          # ─────────────────────────────────────────────────────────────────
          # Detect output type and prepare release asset
          # ─────────────────────────────────────────────────────────────────
          
          # WSL case: has bin/ directory with builder script
          if [[ -d "$BUILD_OUT/bin" ]]; then
            echo "Detected WSL output"
            
            BUILDER=$(find "$BUILD_OUT/bin" -type f | head -n1)
            if [[ -z "$BUILDER" ]]; then
              echo "ERROR: No file found in bin/"
              ls -R "$BUILD_OUT"
              exit 1
            fi

            FINAL_FILE="nixos-${{ inputs.host }}.tar.gz"
            EXTENSION="tar.gz"
            ASSET_TYPE="WSL"

            echo "Running builder script: $BUILDER"
            sudo "$BUILDER" "$FINAL_FILE"

          # ISO case: has iso/ directory
          elif [[ -d "$BUILD_OUT/iso" ]]; then
            echo "Detected ISO output"

            ISO_PATH=$(find "$BUILD_OUT/iso" -type f -name '*.iso' | head -n1)
            if [[ -z "$ISO_PATH" ]]; then
              echo "ERROR: No ISO found"
              exit 1
            fi

            FINAL_FILE="nixos-${{ inputs.host }}.iso"
            EXTENSION="iso"
            ASSET_TYPE="ISO"

            cp -L "$ISO_PATH" "$FINAL_FILE"
            echo "Copied ISO to $FINAL_FILE"

          # Unknown case
          else
            echo "ERROR: Unknown output structure"
            ls -R "$BUILD_OUT"
            exit 1
          fi

          # Compute checksum
          echo ""
          echo "Computing SHA-256 checksum..."
          sha256sum "$FINAL_FILE" > "${FINAL_FILE}.sha256"
          cat "${FINAL_FILE}.sha256"

          # Split into chunks for GitHub releases (2GB limit per file)
          echo ""
          echo "Splitting into ~1.9GB parts..."
          split -d -b 1900M "$FINAL_FILE" "${FINAL_FILE}.part"
          ls -lh ${FINAL_FILE}.part*

          # Export variables for later steps
          echo "FINAL_FILE=$FINAL_FILE" >> $GITHUB_ENV
          echo "EXTENSION=$EXTENSION" >> $GITHUB_ENV
          echo "ASSET_TYPE=$ASSET_TYPE" >> $GITHUB_ENV
          echo "FILE_SIZE=$(stat -c%s "$FINAL_FILE")" >> $GITHUB_ENV
          echo "FILE_SHA256=$(sha256sum "$FINAL_FILE" | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Ensure GitHub CLI is installed
        run: |
          type gh >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y gh)

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "=========================================="
          echo "Creating Release: $RELEASE_TAG"
          echo "=========================================="

          # Delete old release if exists (we want rolling latest)
          echo "Deleting old release if it exists..."
          gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true

          # Build release notes
          cat > release-notes.md << EOF
          # ${{ env.ASSET_TYPE }} Build — ${{ inputs.host }}${{ inputs.tag_suffix }}

          **Build Date:** $(date -u '+%Y-%m-%d %H:%M UTC')  
          **Git Commit:** ${{ github.sha }}  
          **File Size:** $(numfmt --to=iec-i --suffix=B ${{ env.FILE_SIZE }})  
          **SHA-256:** \`${{ env.FILE_SHA256 }}\`

          ## Build Command

          \`\`\`bash
          nix build .#${{ inputs.host }}
          \`\`\`

          ## Download & Verify

          ### Linux/macOS

          1. Download and reassemble:
             \`\`\`bash
             bash <(curl -sL "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/join-iso.sh") ${{ inputs.host }}
             \`\`\`

          2. Verify checksum:
             \`\`\`bash
             sha256sum -c nixos-${{ inputs.host }}.${{ env.EXTENSION }}.sha256
             \`\`\`

          ### Windows (PowerShell)

          \`\`\`powershell
          iwr "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/join-iso.ps1" -OutFile join-iso.ps1
          pwsh -File join-iso.ps1 ${{ inputs.host }}
          \`\`\`

          ## Contents

          - Split archive parts (${{ env.EXTENSION }}.part*)
          - SHA256 checksum file
          - Join scripts (bash/PowerShell)

          ---
          *This is a rolling release. Previous versions are overwritten.*
          EOF

          # Create the release
          echo "Creating release..."
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md

          # Upload assets
          echo ""
          echo "Uploading assets..."
          gh release upload "$RELEASE_TAG" \
            ${{ env.FINAL_FILE }}.part* \
            ${{ env.FINAL_FILE }}.sha256 \
            scripts/join-iso.sh \
            scripts/join-iso.ps1 \
            --clobber

          echo ""
          echo "=========================================="
          echo "Release created successfully!"
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: |
          # Clean up large files to save runner space
          rm -f result-target nixos-*.{iso,tar.gz} nixos-*.part* 2>/dev/null || true
