name: Release NixOS ISO (single release per host)

on:
  workflow_dispatch:
    inputs:
      host:
        description: 'Host name (e.g. server, laptop, desktop)'
        required: true
        type: string
        
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: cairnstew-nixos-config-cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build and Generate Asset
        run: |
          set -euo pipefail
          
          # 1. Build the target
          nix build .#${{ inputs.host }} --out-link result-target
          BUILD_OUT=$(readlink -f result-target)

          # 2. Determine if it's a script (WSL) or a directory (ISO)
          if [[ -f "$BUILD_OUT" && -x "$BUILD_OUT" ]]; then
            echo "Detected WSL builder script. Running with sudo..."
            # Run the builder script. It defaults to 'nixos.wsl' output.
            sudo "$BUILD_OUT" "nixos-${{ inputs.host }".wsl
            FINAL_FILE="nixos-${{ inputs.host }}.wsl"
            EXTENSION="wsl"
          else
            echo "Detected standard ISO directory."
            # Find the ISO in the store directory
            ISO_PATH=$(find "$BUILD_OUT" -name '*.iso' -print -quit)
            FINAL_FILE="nixos-${{ inputs.host }}.iso"
            cp -L "$ISO_PATH" "$FINAL_FILE"
            EXTENSION="iso"
          fi

          # 3. Hash and Split
          echo "==> Computing SHA-256"
          sha256sum "$FINAL_FILE" > "${FINAL_FILE}.sha256"

          echo "==> Splitting into ~1.9 GB parts"
          split -d -b 1900M "$FINAL_FILE" "${FINAL_FILE}.part"

          # Export for the release step
          echo "FINAL_FILE=$FINAL_FILE" >> $GITHUB_ENV
          echo "EXTENSION=$EXTENSION" >> $GITHUB_ENV

      - name: Create (or update) GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="iso-${{ inputs.host }}"
          TITLE="NixOS ISO — ${{ inputs.host }} (latest)"

          # Delete old release (if it exists) so we replace it cleanly
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Latest NixOS ISO for host **${{ inputs.host }}**

          Built from \`nix build .#${{ inputs.host }}\`

          **How to reassemble the ISO:**

          \`\`\`bash
          # 1. Download ALL files from this release into one folder
          # 2. Run:
          bash join-iso.sh nixos-iso-${{ inputs.host }}.iso
          \`\`\`

          The join script is also attached as \`join-iso.sh\`." 

                    echo "Uploading (overwriting) assets..."
                    gh release upload "$TAG" \
                      nixos-iso-${{ inputs.host }}.iso.part* \
                      nixos-iso-${{ inputs.host }}.iso.sha256 \
                      scripts/join-iso.sh \
                      --clobber
