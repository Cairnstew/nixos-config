name: Release NixOS ISO (single release per host)

on:
  workflow_dispatch:
    inputs:
      host:
        description: 'Host name (e.g. server, laptop, desktop)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: cairnstew-nixos-config-cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build ISO
        run: |
          echo "Building .#${{ inputs.host }} (default = images.iso)"
          nix build .#${{ inputs.host }} --out-link result-iso

      - name: Prepare split assets
        run: |
          set -euo pipefail

          # Get the absolute path of the build result
          BUILD_OUT=$(readlink -f result-iso)
          BASE_NAME="nixos-${{ inputs.host }}"

          echo "Build directory in store: $BUILD_OUT"

          # 1. Detection Logic
          # Look for .iso first, then look for .tar.gz (common for WSL)
          ISO_FILE=$(find "$BUILD_OUT" -name '*.iso' -print -quit)
          WSL_FILE=$(find "$BUILD_OUT" -name '*.tar.gz' -print -quit)

          if [[ -n "$ISO_FILE" ]]; then
            TARGET_FILE="$ISO_FILE"
            EXTENSION="iso"
            echo "Detected ISO build."
          elif [[ -n "$WSL_FILE" ]]; then
            TARGET_FILE="$WSL_FILE"
            EXTENSION="wsl.tar.gz"
            echo "Detected WSL tarball build."
          else
            echo "Error: Could not find .iso or .tar.gz in $BUILD_OUT" >&2
            exit 1
          fi

          # 2. Preparation
          FINAL_NAME="${BASE_NAME}.${EXTENSION}"
          cp -L "$TARGET_FILE" "$FINAL_NAME"

          echo "==> Computing SHA-256"
          sha256sum "$FINAL_NAME" > "${FINAL_NAME}.sha256"

          # 3. Splitting (GitHub has a 2GB limit per file)
          echo "==> Splitting into ~1.9 GB parts"
          split -d -b 1900M "$FINAL_NAME" "${FINAL_NAME}.part"

          # Export variables for the next step
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
          echo "EXTENSION=$EXTENSION" >> $GITHUB_ENV

      - name: Create (or update) GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="iso-${{ inputs.host }}"
          TITLE="NixOS ISO — ${{ inputs.host }} (latest)"

          # Delete old release (if it exists) so we replace it cleanly
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Latest NixOS ISO for host **${{ inputs.host }}**

          Built from \`nix build .#${{ inputs.host }}\`

          **How to reassemble the ISO:**

          \`\`\`bash
          # 1. Download ALL files from this release into one folder
          # 2. Run:
          bash join-iso.sh nixos-iso-${{ inputs.host }}.iso
          \`\`\`

          The join script is also attached as \`join-iso.sh\`." 

                    echo "Uploading (overwriting) assets..."
                    gh release upload "$TAG" \
                      nixos-iso-${{ inputs.host }}.iso.part* \
                      nixos-iso-${{ inputs.host }}.iso.sha256 \
                      scripts/join-iso.sh \
                      --clobber