# Generated by flake.nix — edit in modules/flake.nix or use uv add
[build-system]
build-backend = "hatchling.build"
requires = ["hatchling>=1.18.0"]

[project]
name = "ipxe-installer"
version = "0.1.0"
description = "iPXE netboot installer — PXE server, Windows/NixOS unattended install"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.15",
  "jinja2>=3.1",
  "pyyaml>=6.0",
  "requests>=2.32",
  "pydantic>=2.10",
]
[project.scripts]
ipxe-installer = "ipxe_installer.cli:app"

[dependency-groups]
dev = [
  "editables>=0.6",
  "pytest>=8",
  "pytest-cov>=6",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]
