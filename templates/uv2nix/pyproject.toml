[build-system]
build-backend = "hatchling.build"
requires = ["hatchling>=1.18.0"]
[dependency-groups]
dev = ["pytest>=8", "pytest-cov>=6"]
[project]
dependencies = []
description = "A Python project managed with uv and Nix"
name = "my-project"
readme = "README.md"
requires-python = ">=3.12"
version = "0.1.0"
[tool.ruff.lint]
ignore = ["E501"]
select = ["E", "F", "I", "UP"]
[tool.ruff]
line-length = 100
target-version = "py312"
